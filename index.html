<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>মাসুমের ভাইরাল ফান হাব</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#6c5ce7">
    
    <script>
      // Service Worker Register করা
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('PWA Ready!'))
            .catch(err => console.log('PWA Failed', err));
        });
      }
    </script>

    <style>
        :root { 
            --primary: #6c5ce7; 
            --whatsapp: #25D366; 
            --danger: #ff7675; 
            --bg: #f0f2f5; 
        }

        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            background: var(--bg); 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 20px; 
        }

        .card { 
            background: white; 
            padding: 25px; 
            border-radius: 20px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
            width: 100%; 
            max-width: 400px; 
            margin-bottom: 20px; 
            text-align: center; 
        }

        h2 { color: #2d3436; margin-top: 0; font-size: 22px; }
        p { color: #636e72; font-size: 14px; }

        input { 
            width: 85%; 
            padding: 12px; 
            border: 2px solid #ddd; 
            border-radius: 10px; 
            margin-bottom: 15px; 
            outline: none; 
            font-size: 16px; 
        }

        button { 
            background: var(--primary); 
            color: white; 
            border: none; 
            padding: 12px 20px; 
            border-radius: 10px; 
            cursor: pointer; 
            font-weight: bold; 
            width: 100%; 
            font-size: 16px; 
            transition: 0.3s;
        }

        button:hover { opacity: 0.9; transform: translateY(-2px); }

        .share-btn { 
            background: var(--whatsapp); 
            margin-top: 10px; 
            display: none; 
        }

        .result-box { 
            margin-top: 15px; 
            font-weight: bold; 
            font-size: 1.1rem; 
            color: #d63031; 
            min-height: 40px; 
        }

        .game-btn { 
            background: var(--danger); 
            height: 80px; 
            font-size: 1.3rem; 
            margin-top: 10px; 
        }

        .stats { 
            display: flex; 
            justify-content: space-between; 
            margin: 15px 0; 
            font-weight: bold; 
            color: #2d3436; 
        }

        #timer { color: #d63031; }
    </style>
</head>
<body>

    <div class="card">
        <h2>🔍 বন্ধু কেমন? স্ক্যান করো!</h2>
        <p>বন্ধুর নাম লিখে তার আসল রূপ দেখে নাও!</p>
        <input type="text" id="nameInput" placeholder="বন্ধুর নাম লেখো...">
        <button onclick="scanCharacter()">চেক করো!</button>
        <div id="scanResult" class="result-box"></div>
        <button id="shareChar" class="share-btn" onclick="share('char')">হোয়াটসঅ্যাপে শেয়ার করো ✅</button>
    </div>

    <div class="card">
        <h2>⚡ ক্লিক স্পিড টেস্ট</h2>
        <p>১০ সেকেন্ডে কয়বার ক্লিক করতে পারো?</p>
        <div class="stats">
            <span>সময়: <span id="timer">10</span>সে.</span>
            <span>ক্লিক: <span id="score">0</span></span>
        </div>
        <button class="game-btn" id="clickBtn" onclick="handleGameClick()">ক্লিক শুরু!</button>
        <div id="gameMsg" class="result-box"></div>
        <button id="shareGame" class="share-btn" onclick="share('game')">বন্ধুদের চ্যালেঞ্জ দাও 🏆</button>
        <button style="background:#b2bec3; margin-top:10px; height: 40px;" onclick="resetGame()">রিসেট গেম</button>
    </div>

    <script>
        let currentScanResult = "";
        let finalScore = 0;

        // ক্যারেক্টার স্ক্যানার লজিক
        function scanCharacter() {
            const name = document.getElementById('nameInput').value;
            const results = [
                "১০০% বাটপার, সাবধানে থাকিস! 🐍",
                "ভবিষ্যতের বিলিওনেয়ার, ট্রিট রেডি রাখ! 💰",
                "মুখে মধু পেটে বিষ! 🎭",
                "হদ্দ কিপটা, জীবনেও চা খাওয়ায় না! ☕",
                "একদম খাঁটি মানুষ, কলিজার বন্ধু! ❤️",
                "সারাদিন ঘুমায় আর রিলস দেখে! 😴"
            ];
            if(!name) return alert("আগে নাম তো লেখো!");
            
            currentScanResult = name + " হলো " + results[Math.floor(Math.random() * results.length)];
            document.getElementById('scanResult').innerText = currentScanResult;
            document.getElementById('shareChar').style.display = "block";
        }

        // ক্লিক গেম লজিক
        let clicks = 0;
        let timeLeft = 10;
        let timerStarted = false;
        let timerInterval;

        function handleGameClick() {
            if(!timerStarted) {
                timerStarted = true;
                startTimer();
                document.getElementById('gameMsg').innerText = "জোরে ক্লিক করো! 🏃‍♂️";
            }
            if(timeLeft > 0) {
                clicks++;
                document.getElementById('score').innerText = clicks;
            }
        }

        function startTimer() {
            timerInterval = setInterval(() => {
                timeLeft--;
                document.getElementById('timer').innerText = timeLeft;
                if(timeLeft <= 0) {
                    clearInterval(timerInterval);
                    endGame();
                }
            }, 1000);
        }

        function endGame() {
            finalScore = clicks;
            let rank = clicks > 60 ? "প্রো লিজেন্ড! 🔥" : (clicks > 35 ? "মোটামুটি ভালো" : "ধীর গতির কচ্ছপ! 🐢");
            document.getElementById('gameMsg').innerText = `স্কোর: ${clicks}। তুমি একজন ${rank}`;
            document.getElementById('clickBtn').disabled = true;
            document.getElementById('shareGame').style.display = "block";
        }

        function resetGame() {
            clearInterval(timerInterval);
            clicks = 0;
            timeLeft = 10;
            timerStarted = false;
            document.getElementById('score').innerText = "0";
            document.getElementById('timer').innerText = "10";
            document.getElementById('gameMsg').innerText = "";
            document.getElementById('clickBtn').disabled = false;
            document.getElementById('shareGame').style.display = "none";
        }

        // শেয়ার লজিক
        function share(type) {
            let text = "";
            if(type === 'char') {
                text = "দেখো আমার বন্ধুর আসল রূপ: " + currentScanResult;
            } else {
                text = `আমি ১০ সেকেন্ডে ${finalScore} বার ক্লিক করেছি! দেখি তুই পারিস কি না? চ্যালেঞ্জ রইলো!`;
            }
            const url = window.location.href;
            const waUrl = `https://api.whatsapp.com/send?text=${encodeURIComponent(text + " \nচেক করো এখানে: " + url)}`;
            window.open(waUrl, '_blank');
        }
    </script>
</body>
</html>
